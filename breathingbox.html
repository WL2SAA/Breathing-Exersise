<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Box Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f4f8; /* Soft distinct background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevent scrolling on mobile while interacting */
        }
        
        #app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            background: white;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            max-width: 90%;
            width: 300px;
        }

        input[type=range] {
            width: 100%;
            accent-color: #89CFF0;
            cursor: pointer;
        }

        .label {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Canvas for the visualizer -->
        <canvas id="breathCanvas"></canvas>

        <!-- UI Controls -->
        <div class="controls">
            <div class="label" id="speedLabel">Breathing Cycle: 4.0s</div>
            <input type="range" id="speedSlider" min="2" max="10" step="0.1" value="4" aria-label="Breathing Speed">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('breathCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('speedSlider');
        const speedLabel = document.getElementById('speedLabel');

        // State
        let cycleDuration = 4; // seconds
        let time = 0;
        let animationId;
        
        // Colors
        const boxColor = { r: 137, g: 207, b: 240 }; // Soft Blue #89CFF0
        const textColor = "#555";

        // Resize handling
        function resize() {
            // Make canvas fit the window but keep some padding
            // We want a square-ish working area usually, but responsive
            const margin = 40; // margin for UI
            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.8; // Leave room for controls
            
            // Handle high DPI displays
            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = canvas.width + 'px';
            canvas.style.height = canvas.height + 'px';
            canvas.width *= dpr;
            canvas.height *= dpr;
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resize);
        resize();

        // Animation Loop
        function animate() {
            const width = canvas.width / (window.devicePixelRatio || 1);
            const height = canvas.height / (window.devicePixelRatio || 1);
            
            // Clear screen
            ctx.clearRect(0, 0, width, height);
            
            // Time calculation
            // cycleDuration is in seconds.
            // frequency = 2PI / (cycleDuration * 1000)
            const now = Date.now();
            // We divide by 1000 to get seconds, multiply by (2PI / duration) for the wave
            const phase = (now / 1000) * ((Math.PI * 2) / cycleDuration);
            
            // Calculate Breathing Factor (-1 to 1)
            // We want it to start at neutral? Sine works fine.
            // -1 is fully contracted (empty lungs), 1 is fully expanded (full lungs)
            const breathValue = Math.sin(phase);
            
            // Determine state (Inhale vs Exhale)
            // Derivative of sin is cos. 
            // If cos > 0, we are going up (Inhaling). 
            // If cos < 0, we are going down (Exhaling).
            const velocity = Math.cos(phase);
            const isInhaling = velocity > 0;

            // Map breathValue to Box Size
            // Base size: 30% of smaller screen dimension
            // Amplitude: 10% of smaller screen dimension
            const minDim = Math.min(width, height);
            const baseSize = minDim * 0.3;
            const amplitude = minDim * 0.1;
            const currentSize = baseSize + (breathValue * amplitude);

            // Draw Box
            const centerX = width / 2;
            const centerY = height / 2;

            ctx.save();
            ctx.translate(centerX, centerY);
            
            // Gentle rotation for organic feel? (Optional, kept subtle)
            // ctx.rotate(breathValue * 0.05); 

            // Dynamic Color opacity based on breath intensity
            const opacity = 0.6 + (breathValue * 0.2); // 0.4 to 0.8
            ctx.fillStyle = `rgba(${boxColor.r}, ${boxColor.g}, ${boxColor.b}, ${opacity})`;
            
            // Rounded Rectangle Logic
            const radius = 20;
            const s = currentSize; // half width effectively if we draw from center
            
            // Draw centered rounded square
            ctx.beginPath();
            ctx.roundRect(-s, -s, s * 2, s * 2, radius);
            ctx.fill();
            
            // Optional: Subtle glow
            ctx.shadowBlur = 20 + (breathValue * 10);
            ctx.shadowColor = `rgba(${boxColor.r}, ${boxColor.g}, ${boxColor.b}, 0.5)`;
            ctx.stroke(); // Apply shadow to stroke if needed, or fill handles it
            
            ctx.restore();

            // Text Rendering
            ctx.font = `300 ${Math.max(16, minDim * 0.05)}px system-ui, -apple-system, sans-serif`;
            ctx.fillStyle = textColor;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            let text = "";
            let subText = "";
            
            // Determine text based on phase
            if (isInhaling) {
                text = "Breathe In...";
                // Calculate progress for opacity of text
                // We want smooth transition.
            } else {
                text = "Breathe Out...";
            }

            // Draw Text centered on top of box
            // We use globalAlpha to pulse the text slightly opposite to the box to ensure readability
            // or just keep it solid. Let's keep it solid for clarity.
            ctx.fillText(text, centerX, centerY);

            requestAnimationFrame(animate);
        }

        // Controls Logic
        slider.addEventListener('input', (e) => {
            cycleDuration = parseFloat(e.target.value);
            speedLabel.textContent = `Breathing Cycle: ${cycleDuration.toFixed(1)}s`;
        });

        // Start
        animate();

    </script>
</body>
</html>
